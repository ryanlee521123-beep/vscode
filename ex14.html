<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlapping Shapes</title>
    <style>
        .shape-container {
            position: relative; 
            margin: 50px;
        }

        .rectangle {
            width: 200px;
            height: 150px;
            background-color: blue;
            border: 4px solid black;
            
            position: absolute;
            top: 0;
            left: 0;
        }

        .circle {
            width: 130px;
            height: 130px;
            background-color: yellow;
            border: 4px solid red;
            border-radius: 50%;
            
            position: absolute;
            top: 10px;  
            left: 130px; 
        }
    </style>
</head>
<body>

    <div class="shape-container">
        <div class="rectangle"></div>
        <div class="circle"></div>
    </div>

</body>
</html>
